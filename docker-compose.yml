services:
  minio:
    image: minio/minio:latest
    container_name: repair-minio
    restart: unless-stopped
    ports:
      - "9000:9000" # API 端口（你的 Spring Boot 配置项指向这里）
      - "9001:9001" # Web 控制台界面端口
    environment:
      MINIO_ROOT_USER: root    # 对应你配置里的 access-key
      MINIO_ROOT_PASSWORD: root12345 # 对应你配置里的 secret-key（MinIO 要求至少8位）
    command: server /data --console-address ":9001"
    volumes:
      - ./minio_data:/data # 数据会挂载到你项目目录下的 minio_data 文件夹中，防止容器重启丢失